<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Interactive Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>


<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  font-family: Arial, sans-serif;
}
#map {
  width: 65%;
  height: 100%;
}
#panel {
  width: 35%;
  padding: 15px;
  overflow-y: auto;
  border-left: 2px solid #ccc;
}
img {
  max-width: 100%;
}
iframe {
  width: 100%;
  height: 250px;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="panel">
  <h2>Welcome</h2>
  <p>Click a marker to load content.</p>
</div>



<script>
const map = L.map('map').setView([13.536792850901307, 52.43285698844102 ], 5);

setTimeout(() => {
  map.invalidateSize();
}, 200);

// OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

let activeMarker = null;

// load points
fetch('data/points-ai.geojson' + "?v=" + Date.now())
  .then(res => res.json())
  .then(data => {
    const geoLayer = L.geoJSON(data, {
      pointToLayer: function(feature, latlng) {
        return L.marker(latlng);
      },
      onEachFeature: function(feature, layer) {

        layer.on('click', function() {

          // highlight marker
          if (activeMarker) {
            activeMarker.getElement().classList.remove('active');
          }
          activeMarker = layer;
          layer.getElement().classList.add('active');

          // load markdown
          fetch(feature.properties.content_file)
            .then(r => r.text())
            .then(md => {
			const repoName = window.location.pathname.split('/')[1];

			//fix obsidian links
			function convertWikilinks(md) {
			  const siteBase = "https://marksomogyvari.github.io/demotape-explorer/";

			  return md.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (match, target, alias) => {
				const slug = target.trim();
				const text = alias ? alias.trim() : target.trim();

				return `<a href="${siteBase}${slug}">${text}</a>`;
			  });
			}

			const fixedMd = convertWikilinks(md);
			const html = marked.parse(fixedMd);

			// fix image paths
			// derive correct site root from current URL
			const url = new URL(window.location.href);

			// strip "/static/maps/" from the end
			url.pathname = url.pathname.replace(/\/static\/maps\/?$/, "");

			const basePath = url.origin + url.pathname;
			console.log("BASE PATH =", basePath);

			const fixedHtml = html
			  // fix absolute-root images: /images/foo.jpg
			  .replace(/src="\/images\//g, `src="${basePath}/images/`)
			  // fix relative images: images/, ./images/, ../images/
			  .replace(/src="(\.\/|\.\.\/)?images\//g, `src="${basePath}/images/`);


			//Backlink to wiki start
			const base = window.location.origin;
			const homeUrl = base + "/demotape-explorer/";

			document.getElementById('panel').innerHTML = `
			  <div style="margin-bottom: 10px;">
				<a href="${homeUrl}" style="font-weight: bold;">← Back to Knowledge Platform</a>
			  </div>
			  <h2>${feature.properties.title}</h2>
			  ${fixedHtml}
			`;
			});

        });
      }
    }).addTo(map);

// map.fitBounds(geoLayer.getBounds());
  });
</script>

</body>
</html>
